services:
  mysql:
    image: mysql:latest
    container_name: mysql-pi
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: florayfauna
      MYSQL_USER: admin
      MYSQL_PASSWORD: password123
    ports:
      - "3307:3306"
    volumes:
      - mysql_lab_data:/var/lib/mysql
      - ./mysql/database.sql:/docker-entrypoint-initdb.d/database.sql
    networks: [labnet]
    restart: unless-stopped

  api:
    build: ./api
    container_name: api-pi
    working_dir: /app
    volumes:
      - ./src/API_LAB:/app
    environment:
      API_KEYS: "admin:MASTER999,usuario:USER123,profesor:TEACHER111"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: admin
      DB_PASS: password123
      DB_NAME: florayfauna
    depends_on: [mysql]
    networks: [labnet]
    restart: unless-stopped

  flask:
    build: ./flask
    container_name: flask_pi
    working_dir: /app
    volumes:
      - ./src/flask_project:/app
    environment:
      FLASK_ENV: development
      API_URL: http://api-pi:8000
      API_KEY: MASTER999
    depends_on: [api]
    networks: [labnet]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-pi
    ports:
      - "80:80"
      - "5000:5000"
      - "8000:8000"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [flask, api]
    networks: [labnet]
    restart: unless-stopped

volumes:
  mysql_lab_data:

networks:
  labnet: